# =============================================================================
# Phalanx — Helm Chart Values
# =============================================================================

replicaCount: 2

image:
  repository: ghcr.io/phalanx-ai/phalanx
  tag: "1.0.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  port: 3100

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: phalanx.company.internal
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# ---------------------------------------------------------------------------
# PostgreSQL (Bitnami subchart or external)
# ---------------------------------------------------------------------------
postgresql:
  enabled: true  # Set to false if using external database
  auth:
    database: phalanx
    username: phalanx
    password: ""  # Set via --set or secrets
    existingSecret: ""
  primary:
    persistence:
      size: 20Gi
  # External database (used when postgresql.enabled=false)
  external:
    host: ""
    port: 5432
    database: phalanx
    existingSecret: ""
    secretKeys:
      username: username
      password: password

# ---------------------------------------------------------------------------
# Redis (Bitnami subchart or external)
# ---------------------------------------------------------------------------
redis:
  enabled: true
  auth:
    enabled: false
  master:
    persistence:
      size: 2Gi
  external:
    host: ""
    port: 6379

# ---------------------------------------------------------------------------
# Phalanx Configuration
# ---------------------------------------------------------------------------
config:
  logLevel: info

  queue:
    concurrency: 10
    maxRetries: 2
    jobTimeoutMs: 120000

  audit:
    retentionDays: 1095
    hashChain: false
    archiveToS3: false

  review:
    maxDiffSizeBytes: 5000000
    postCommentOnPr: true
    createCheckRun: true
    blockMergeOnFail: true

  # Comma-separated list of origins permitted by CORS. Empty disables CORS.
  cors:
    allowedOrigins: ""

  # Comma-separated <model>=<input>/<output> overrides for the cost table
  # in internal/agent/runtime.go. Empty uses the built-in defaults only.
  modelPricingOverrides: ""

# ---------------------------------------------------------------------------
# Secrets (create manually or reference existing)
# ---------------------------------------------------------------------------
secrets:
  # If set, the chart skips creating its own secret and the deployment reads
  # from this secret name. Recommended for production (use sealed-secrets,
  # external-secrets, etc.).
  existingSecret: ""

  # Inline values — only used when existingSecret is empty. NOT recommended
  # for production: helm renders these into chart history.
  api:
    # Comma-separated bearer tokens accepted by /api/*. Empty disables auth.
    tokens: ""
  github:
    token: ""
    webhookSecret: ""
  gitlab:
    token: ""
    webhookSecret: ""
  bitbucket:
    auth: ""        # "<username>:<app_password>" or "x-token-auth:<token>"
    webhookUuid: "" # X-Hook-UUID expected on inbound webhooks
  llm:
    anthropicApiKey: ""
    openaiApiKey: ""
    deepseekApiKey: ""

# ---------------------------------------------------------------------------
# Migrations job
# ---------------------------------------------------------------------------
migrations:
  enabled: true
  backoffLimit: 3

# ---------------------------------------------------------------------------
# Service Monitor (Prometheus)
# ---------------------------------------------------------------------------
serviceMonitor:
  enabled: false
  interval: 30s

# ---------------------------------------------------------------------------
# Pod configuration
# ---------------------------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
