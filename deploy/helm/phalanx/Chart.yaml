apiVersion: v2
name: phalanx
description: AI-powered multi-agent pull request review platform
type: application
version: 1.1.0
appVersion: "1.0.0"
keywords:
  - code-review
  - ai
  - llm
  - pull-request
  - security
  - quality
maintainers:
  - name: Phalanx Team
dependencies:
  - name: postgresql
    version: "16.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "20.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
