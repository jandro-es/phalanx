{{/*
  Default Phalanx secret. Skipped when the user points at an existing secret
  via .Values.secrets.existingSecret. Producing the secret in-chart is
  convenient for evaluation but for production you should set
  existingSecret and create the resource out-of-band (sealed-secrets,
  external-secrets, etc.).
*/}}
{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "phalanx.fullname" . }}-secrets
  labels:
    app.kubernetes.io/name: {{ include "phalanx.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  {{- with .Values.secrets.api.tokens }}
  api-tokens: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.github.token }}
  github-token: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.github.webhookSecret }}
  github-webhook-secret: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.gitlab.token }}
  gitlab-token: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.gitlab.webhookSecret }}
  gitlab-webhook-secret: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.bitbucket.auth }}
  bitbucket-auth: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.bitbucket.webhookUuid }}
  bitbucket-webhook-uuid: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.llm.anthropicApiKey }}
  anthropic-api-key: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.llm.openaiApiKey }}
  openai-api-key: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.llm.deepseekApiKey }}
  deepseek-api-key: {{ . | quote }}
  {{- end }}
{{- end }}
