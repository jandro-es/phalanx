apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "phalanx.fullname" . }}-config
  labels:
    app.kubernetes.io/name: {{ include "phalanx.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  PHALANX_QUEUE_CONCURRENCY: {{ .Values.config.queue.concurrency | quote }}
  PHALANX_QUEUE_MAX_RETRIES: {{ .Values.config.queue.maxRetries | quote }}
  PHALANX_QUEUE_JOB_TIMEOUT: {{ .Values.config.queue.jobTimeoutMs | quote }}
  PHALANX_AUDIT_HASH_CHAIN: {{ .Values.config.audit.hashChain | quote }}
  PHALANX_AUDIT_RETENTION_DAYS: {{ .Values.config.audit.retentionDays | quote }}
  PHALANX_MAX_DIFF_SIZE: {{ .Values.config.review.maxDiffSizeBytes | quote }}
  PHALANX_POST_COMMENT: {{ .Values.config.review.postCommentOnPr | quote }}
  PHALANX_CREATE_CHECK_RUN: {{ .Values.config.review.createCheckRun | quote }}
  PHALANX_BLOCK_MERGE_ON_FAIL: {{ .Values.config.review.blockMergeOnFail | quote }}
  {{- with .Values.config.cors.allowedOrigins }}
  PHALANX_CORS_ALLOWED_ORIGINS: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.modelPricingOverrides }}
  PHALANX_MODEL_PRICING: {{ . | quote }}
  {{- end }}
