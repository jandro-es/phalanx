apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "phalanx.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "phalanx.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "phalanx.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        app.kubernetes.io/name: {{ include "phalanx.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: phalanx
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 3100
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "phalanx.fullname" . }}-config
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3100"
            # Database
            {{- if .Values.postgresql.enabled }}
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgresql.auth.username }}:$(DB_PASSWORD)@{{ include "phalanx.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "phalanx.fullname" . }}-postgresql
                  key: password
            {{- else }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.external.existingSecret }}
                  key: url
            {{- end }}
            # Redis
            {{- if .Values.redis.enabled }}
            - name: REDIS_URL
              value: "redis://{{ include "phalanx.fullname" . }}-redis-master:6379"
            {{- else }}
            - name: REDIS_URL
              value: "redis://{{ .Values.redis.external.host }}:{{ .Values.redis.external.port }}"
            {{- end }}
            # Secrets from Kubernetes secret
            {{- $secretName := .Values.secrets.existingSecret | default (printf "%s-secrets" (include "phalanx.fullname" .)) }}
            - name: PHALANX_API_TOKENS
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: api-tokens
                  optional: true
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: github-token
                  optional: true
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: github-webhook-secret
                  optional: true
            - name: GITLAB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: gitlab-token
                  optional: true
            - name: GITLAB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: gitlab-webhook-secret
                  optional: true
            - name: BITBUCKET_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: bitbucket-auth
                  optional: true
            - name: BITBUCKET_WEBHOOK_UUID
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: bitbucket-webhook-uuid
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: anthropic-api-key
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: openai-api-key
                  optional: true
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: deepseek-api-key
                  optional: true
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
